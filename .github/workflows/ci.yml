name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  firmware:
    name: ESP32 firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install PlatformIO
        run: python -m pip install platformio
      - name: Prepare placeholder Wi-Fi credentials
        run: cp firmware/esp32/include/wifi_credentials.example.h firmware/esp32/include/wifi_credentials.h
      - name: Build firmware
        run: pio run --project-dir firmware/esp32
